<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}SignalX{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>
      :root {
        --bs-body-font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      }

      body {
        background-color: #f3f4f6;
        font-family: var(--bs-body-font-family);
      }

      .navbar-signalx {
        background-color: #ffffff;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      }
      .navbar-brand {
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
      }
      .navbar-brand-icon {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        margin-right: 0.5rem;
        box-shadow: 0 6px 14px rgba(37, 99, 235, 0.55);
      }
      .nav-link {
        font-size: 0.9rem;
        font-weight: 500;
        color: #4b5563 !important;
      }
      .nav-link.active {
        color: #111827 !important;
      }
      .nav-auth-btn {
        font-size: 0.82rem;
        border-radius: 999px;
        padding-inline: 1.1rem;
        padding-block: 0.45rem;
      }

      .bluestock-card {
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 12px 28px rgba(148, 163, 184, 0.22);
      }

      .ml-badge {
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.06);
        color: #1d4ed8;
        font-size: 0.8rem;
        font-weight: 600;
      }
    </style>

    {% block extra_head %}{% endblock %}
  </head>
  <body>

    <!-- Top navbar -->
    <nav class="navbar navbar-expand-lg navbar-bluestock sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
          <span class="navbar-brand-icon">
            <i class="fas fa-chart-line"></i>
          </span>
          SignalX
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto me-3">
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                 href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint in ['all_companies','company_detail'] %}active{% endif %}"
                 href="{{ url_for('all_companies') }}">Companies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %} position-relative"
                 href="{{ url_for('dashboard') }}">
                <i class="fas fa-bell me-1"></i>Alerts & Opportunities
                <span id="unreadBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.65rem; padding: 0.25rem 0.5rem;">
                  <span id="unreadCount">0</span>
                  <span class="visually-hidden">unread alerts</span>
                </span>
              </a>
            </li>
          </ul>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary nav-auth-btn" type="button">
              Sign in
            </button>
            <button class="btn btn-primary nav-auth-btn" type="button">
              Sign up
            </button>
          </div>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="bg-white border-top mt-5 py-4">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6 small text-muted">
            <i class="fas fa-code me-1 text-primary"></i>
            Built with by <strong>Harish</strong> | Bluestock © 2026
          </div>
          <div class="col-md-6 text-md-end small">
            <a href="#privacy" class="text-muted text-decoration-none me-3">Privacy</a>
            <a href="#terms" class="text-muted text-decoration-none">Terms</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      // Update unread alert badge in navbar
      function updateAlertBadge() {
        fetch('/api/alerts?unread_only=true')
          .then(response => response.json())
          .then(data => {
            const badge = document.getElementById('unreadBadge');
            const count = document.getElementById('unreadCount');
            
            if (data.length > 0) {
              count.textContent = data.length;
              badge.style.display = 'inline-block';
            } else {
              badge.style.display = 'none';
            }
          })
          .catch(error => console.error('Error fetching alerts:', error));
      }
      
      // Update badge on page load and every 30 seconds
      updateAlertBadge();
      setInterval(updateAlertBadge, 30000);
    </script>
  </body>
</html>
